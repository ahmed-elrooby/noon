paths:
  /coupon:
    post:
      tags:
        - Coupons
      summary: Create coupon
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - discount
                - expires
              properties:
                code:
                  type: string
                  example: SUMMER25
                discount:
                  type: number
                  example: 25
                expires:
                  type: string
                  format: date
                  example: "2026-12-31"

      responses:
        "200":
          description: Coupon created successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    get:
      tags:
        - Coupons
      summary: Get all coupons
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Coupons retrieved successfully
        "401":
          description: Unauthorized

  /coupon/{id}:
    get:
      tags:
        - Coupons
      summary: Get specific coupon
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "6872f2b6d34ab1f0d4bcb123"

      responses:
        "200":
          description: Coupon retrieved successfully
        "404":
          description: Coupon not found

    put:
      tags:
        - Coupons
      summary: Update coupon
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  example: SUMMER25
                discount:
                  type: number
                  example: 30
                expires:
                  type: string
                  format: date
                  example: "2026-12-31"

      responses:
        "200":
          description: Coupon updated successfully

    delete:
      tags:
        - Coupons
      summary: Delete coupon
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Coupon deleted successfully

  /applyCoupon:
    post:
      tags:
        - Coupons
      summary: Apply coupon to logged user cart
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: SUMMER25

      responses:
        "200":
          description: Coupon applied successfully
        "400":
          description: Invalid coupon
        "401":
          description: Unauthorized
