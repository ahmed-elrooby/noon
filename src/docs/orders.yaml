paths:
  /orders:
    get:
      tags:
        - Orders
      summary: Get logged user orders
      description: Retrieve all orders for the authenticated user.
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Orders retrieved successfully
        "401":
          description: Unauthorized

  /orders/all:
    get:
      tags:
        - Orders
      summary: Get all orders (Admin)
      description: Retrieve all orders. Admin only.
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Orders retrieved successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /orders/{id}:
    post:
      tags:
        - Orders
      summary: Create cash order
      description: Create a cash order using the user's cart.
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          description: Cart ID
          schema:
            type: string
          example: "6872f2b6d34ab1f0d4bcb123"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shippingAddress
              properties:
                shippingAddress:
                  type: object
                  properties:
                    details:
                      type: string
                      example: "15 El Gomhoria Street"
                    city:
                      type: string
                      example: "Beni Suef"
                    phone:
                      type: string
                      example: "01012345678"

      responses:
        "200":
          description: Order created successfully
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "404":
          description: Cart not found

  /orders/checkout/{id}:
    post:
      tags:
        - Orders
      summary: Create Stripe checkout session
      description: Create a Stripe checkout session for online payment.
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          description: Cart ID
          schema:
            type: string
          example: "6872f2b6d34ab1f0d4bcb123"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shippingAddress
              properties:
                shippingAddress:
                  type: object
                  properties:
                    details:
                      type: string
                      example: "15 El Gomhoria Street"
                    city:
                      type: string
                      example: "Beni Suef"
                    phone:
                      type: string
                      example: "01012345678"

      responses:
        "200":
          description: Checkout session created successfully
        "401":
          description: Unauthorized
        "404":
          description: Cart not found
