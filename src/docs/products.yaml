paths:
  /products:
    get:
      tags:
        - Products
      summary: Get all products
      description: Retrieve all products.

      responses:
        "200":
          description: Products retrieved successfully

    post:
      tags:
        - Products
      summary: Create product
      description: Create a new product with cover image and gallery images.
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - description
                - price
                - quantity
                - category
                - imgCover
              properties:
                title:
                  type: string
                  example: iPhone 15 Pro Max

                description:
                  type: string
                  example: Apple smartphone

                price:
                  type: number
                  example: 55000

                quantity:
                  type: integer
                  example: 15

                category:
                  type: string
                  example: "6872f2b6d34ab1f0d4bcb123"

                subCategory:
                  type: string
                  example: "6872f2b6d34ab1f0d4bcb124"

                brand:
                  type: string
                  example: "6872f2b6d34ab1f0d4bcb125"

                imgCover:
                  type: string
                  format: binary

                images:
                  type: array
                  items:
                    type: string
                    format: binary

      responses:
        "200":
          description: Product created successfully
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get single product

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "6872f2b6d34ab1f0d4bcb123"

      responses:
        "200":
          description: Product retrieved successfully
        "404":
          description: Product not found

    put:
      tags:
        - Products
      summary: Update product

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                quantity:
                  type: integer

      responses:
        "200":
          description: Product updated successfully

    delete:
      tags:
        - Products
      summary: Delete product

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Product deleted successfully
        "404":
          description: Product not found
