paths:
  /categories:
    get:
      tags:
        - Categories
      summary: Get all categories
      description: Retrieve all categories.

      responses:
        "200":
          description: Categories retrieved successfully

    post:
      tags:
        - Categories
      summary: Create category
      description: Create a new category with image.

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - image
              properties:
                name:
                  type: string
                  example: Electronics
                image:
                  type: string
                  format: binary

      responses:
        "200":
          description: Category created successfully
        "400":
          description: Validation error

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Get single category

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 6872f2b6d34ab1f0d4bcb123

      responses:
        "200":
          description: Category retrieved successfully
        "404":
          description: Category not found

    put:
      tags:
        - Categories
      summary: Update category

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Electronics
                image:
                  type: string
                  format: binary

      responses:
        "200":
          description: Category updated successfully
        "404":
          description: Category not found

    delete:
      tags:
        - Categories
      summary: Delete category

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Category deleted successfully
        "404":
          description: Category not found

  /categories/{categoryId}/subcategories:
    get:
      tags:
        - SubCategories
      summary: Get subcategories by category

      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Subcategories retrieved successfully
