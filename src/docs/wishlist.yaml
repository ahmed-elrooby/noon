paths:
  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Get logged user wishlist
      description: Retrieve the authenticated user's wishlist.
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Wishlist retrieved successfully
        "401":
          description: Unauthorized

    patch:
      tags:
        - Wishlist
      summary: Add product to wishlist
      description: Add a product to the authenticated user's wishlist.
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: string
                  example: "6872f2b6d34ab1f0d4bcb123"

      responses:
        "200":
          description: Product added to wishlist successfully
        "401":
          description: Unauthorized
        "404":
          description: Product not found

    delete:
      tags:
        - Wishlist
      summary: Remove product from wishlist
      description: Remove a product from the authenticated user's wishlist.
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: string
                  example: "6872f2b6d34ab1f0d4bcb123"

      responses:
        "200":
          description: Product removed successfully
        "401":
          description: Unauthorized
        "404":
          description: Product not found
