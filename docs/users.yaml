paths:
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve all users.

      responses:
        "200":
          description: Users retrieved successfully

    post:
      tags:
        - Users
      summary: Create user

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Ahmed Eid

                email:
                  type: string
                  example: ahmed@gmail.com

                password:
                  type: string
                  example: Ahmed@123

                phone:
                  type: string
                  example: "01012345678"

                role:
                  type: string
                  example: user

      responses:
        "200":
          description: User created successfully

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get single user

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: User retrieved successfully
        "404":
          description: User not found

    put:
      tags:
        - Users
      summary: Update user

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string

                email:
                  type: string

                phone:
                  type: string

      responses:
        "200":
          description: User updated successfully

    delete:
      tags:
        - Users
      summary: Delete user

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: User deleted successfully

  /users/changePassword/{id}:
    patch:
      tags:
        - Users
      summary: Change user password

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  example: NewPassword@123

      responses:
        "200":
          description: Password changed successfully
        "404":
          description: User not found
