paths:
  /reviews:
    get:
      tags:
        - Reviews
      summary: Get all reviews
      description: Retrieve all product reviews.

      responses:
        "200":
          description: Reviews retrieved successfully

    post:
      tags:
        - Reviews
      summary: Create review
      description: Create a review for a product.
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - ratings
                - product
              properties:
                title:
                  type: string
                  example: Amazing product

                ratings:
                  type: number
                  example: 5

                product:
                  type: string
                  example: "6872f2b6d34ab1f0d4bcb123"

      responses:
        "200":
          description: Review created successfully
        "401":
          description: Unauthorized
        "404":
          description: Product not found

  /reviews/{id}:
    get:
      tags:
        - Reviews
      summary: Get single review

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "6872f2b6d34ab1f0d4bcb123"

      responses:
        "200":
          description: Review retrieved successfully
        "404":
          description: Review not found

    put:
      tags:
        - Reviews
      summary: Update review
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Updated review

                ratings:
                  type: number
                  example: 4

      responses:
        "200":
          description: Review updated successfully
        "401":
          description: Unauthorized

    delete:
      tags:
        - Reviews
      summary: Delete review
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Review deleted successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Review not found
