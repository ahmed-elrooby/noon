paths:
  /brands:
    post:
      tags:
        - Brands
      summary: Create Brand
      description: Create a new brand with logo.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - logo
              properties:
                name:
                  type: string
                  example: Apple
                logo:
                  type: string
                  format: binary

      responses:
        "200":
          description: Brand created successfully
        "400":
          description: Validation error

    get:
      tags:
        - Brands
      summary: Get All Brands
      responses:
        "200":
          description: Brands retrieved successfully

  /brands/{id}:
    get:
      tags:
        - Brands
      summary: Get Single Brand

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 6872f2b6d34ab1f0d4bcb123

      responses:
        "200":
          description: Brand retrieved successfully
        "404":
          description: Brand not found

    put:
      tags:
        - Brands
      summary: Update Brand

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Samsung

      responses:
        "200":
          description: Brand updated successfully
        "404":
          description: Brand not found

    delete:
      tags:
        - Brands
      summary: Delete Brand

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Brand deleted successfully
        "404":
          description: Brand not found
